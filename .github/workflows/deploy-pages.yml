# Builds the Vite app and deploys to GitHub Pages on every push to dev.
# The compiled dist/ output goes to the gh-pages branch.
# GitHub Pages must be set to: Source = Deploy from branch, Branch = gh-pages, Folder = / (root)

name: Deploy to GitHub Pages

on:
  push:
    branches: [dev]
  workflow_dispatch:   # also lets you trigger manually from the Actions tab

permissions:
  contents: write      # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Base path must match the GitHub repo name for Pages to serve assets correctly
          VITE_BASE_PATH: /wieser-baby/
          # Firebase env vars — set these in GitHub repo Settings → Secrets and variables → Actions
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./dist
          # SPA routing fix: copies index.html to 404.html so deep links work on refresh
          enable_jekyll: false
